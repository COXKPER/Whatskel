name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Build for Linux
        run: GOOS=linux GOARCH=amd64 go build -o Whatskel-linux-amd64 .

      - name: Build for Windows
        run: GOOS=windows GOARCH=amd64 go build -o Whatskel-windows-amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: |
            Whatskel-linux-amd64
            Whatskel-windows-amd64.exe
